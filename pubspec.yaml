name: clickdoc1
description: "ClickDoc Flutter Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  firebase_core: any
  firebase_messaging: ^15.2.10   # works with firebase_core 3.x
  flutter_local_notifications: ^17.0.0
  firebase_auth: any
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  intl: ^0.18.1
  cupertino_icons: ^1.0.8
  geolocator: ^10.1.1
  firebase_storage: any
  record : any
  path_provider: any
  url_launcher: any
  geoflutterfire2: any
  http: ^1.2.0

  flutter_dotenv: ^5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/medical-assistance.png
    - assets/symptom_department_map.json

name: clickdoc1
description: "ClickDoc Flutter Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  image_picker: ^1.1.0

  # Firebase 2026 "BoM 4.14.0" Aligned Stack
  # These versions are designed to work together without conflicts
  firebase_core: ^4.9.0       # ✅ Upgraded from 3.15.0 to resolve storage error
  firebase_auth: ^6.4.0        # Aligned with Core 4.x
  cloud_firestore: ^6.4.0      # Aligned with Core 4.x
  firebase_storage: ^13.4.1    # Your required version
  firebase_messaging: ^16.2.1  # Stable 2026 release

  # Replacement for geoflutterfire2 (to support Firestore 6.x)
  geoflutterfire_plus: ^0.0.34

  # Real-time Communication
  flutter_webrtc: ^1.4.1
  web: ^1.0.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Core Utilities (Updated for Flutter 3.41 compatibility)
  flutter_local_notifications: ^18.0.0
  intl: ^0.20.0
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.1
  google_maps_flutter: ^2.10.0
  shared_preferences: ^2.3.0

  # Media & Hardware
  record: ^5.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.0
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  just_audio: ^0.9.40
  file_picker: ^8.1.0


dependency_overrides:
  # ✅ Force the interface to a version that RecordLinux actually supports
  record_platform_interface: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/medical-assistance.png
    - assets/symptom_department_map.json
    - .env